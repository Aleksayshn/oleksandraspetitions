<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Petition</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<main class="page page--narrow">
    <header class="page-header">
        <p class="eyebrow">Oleksandra's Petitions</p>
        <h1>Create Petition</h1>
        <p class="intro">Add a new petition with a title, description, and author name.</p>
    </header>

    <section class="form-card">
        <form th:action="@{/petitions}" th:object="${petition}" method="post" class="petition-form" novalidate>
            <div class="form-group">
                <label for="title">Title</label>
                <input id="title" type="text" th:field="*{title}" th:classappend="${#fields.hasErrors('title')} ? ' input-error'">
                <p class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">Title error</p>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" th:field="*{description}" rows="6"
                          th:classappend="${#fields.hasErrors('description')} ? ' input-error'"></textarea>
                <p class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}">Description error</p>
            </div>

            <div class="form-group">
                <label for="authorName">Author Name</label>
                <input id="authorName" type="text" th:field="*{authorName}"
                       th:classappend="${#fields.hasErrors('authorName')} ? ' input-error'">
                <p class="field-error" th:if="${#fields.hasErrors('authorName')}" th:errors="*{authorName}">Author error</p>
            </div>

            <div class="form-actions">
                <a class="button-link button-link--secondary" th:href="@{/petitions}">Cancel</a>
                <button type="submit" class="button-link">Save Petition</button>
            </div>
        </form>
    </section>
</main>
</body>
</html>
